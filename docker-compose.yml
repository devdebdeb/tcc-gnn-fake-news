services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - BSKY_HANDLE=${BSKY_HANDLE}
      - BSKY_PASSWORD=${BSKY_PASSWORD}
    volumes:
      # Banco de dados persistido fora do container
      - ./frontend/api/truth_analytics.db:/app/frontend/api/truth_analytics.db
      # Fakes detectados persistidos fora do container
      - ./frontend/api/fakes_testados.json:/app/frontend/api/fakes_testados.json
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
